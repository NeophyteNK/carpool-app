<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carpool — Classroom Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #F6F3EC;
    --bg: #0F2119;
    --panel: #16301F;
    --gate-green: #2E9A6B;
    --gate-green-bright: #3FD98C;
    --amber: #E0A34A;
    --line-gray: #325240;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 22px 40px;
    border-bottom: 1px solid var(--line-gray);
  }
  header .brand { font-family: 'DM Serif Display', serif; font-size: 22px; }
  header .room { font-size: 15px; color: #9FBCA9; }
  header .clock { font-size: 22px; font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }

  main { flex: 1; padding: 34px 40px; display: flex; flex-direction: column; gap: 26px; overflow: hidden; }

  .panel { border-radius: 20px; padding: 26px 30px; }
  .panel-ready {
    background: linear-gradient(180deg, #1B4A34, #123322);
    border: 2px solid var(--gate-green-bright);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 rgba(63,217,140,0); }
    50% { box-shadow: 0 0 40px rgba(63,217,140,0.35); }
  }
  .panel-waiting { background: var(--panel); border: 1px solid var(--line-gray); flex: 1; overflow-y: auto; }

  .panel-label {
    font-size: 13px; text-transform: uppercase; letter-spacing: 0.16em;
    color: var(--gate-green-bright); margin-bottom: 14px; font-weight: 700;
  }
  .panel-waiting .panel-label { color: var(--amber); }

  .ready-names { font-family: 'DM Serif Display', serif; font-size: 46px; line-height: 1.3; }

  .waiting-grid { display: flex; flex-wrap: wrap; gap: 10px; }
  .waiting-chip {
    background: rgba(224,163,74,0.12);
    border: 1px solid rgba(224,163,74,0.4);
    padding: 8px 16px; border-radius: 999px; font-size: 16px;
  }
  .waiting-empty { font-size: 16px; color: #6B8A78; }

  footer { padding: 14px 40px; font-size: 12px; color: #6B8A78; text-align: right; }
</style>
</head>
<body>

<div id="setup" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:18px;">
  <div style="font-family:'DM Serif Display',serif;font-size:28px;">Room setup</div>
  <input id="setupRoom" placeholder="Room number" style="padding:12px;font-size:16px;border-radius:8px;text-align:center;">
  <button id="setupSave" style="padding:14px 30px;font-size:16px;border-radius:10px;border:none;background:#2E9A6B;color:#fff;cursor:pointer;">Save Room</button>
</div>

<div id="display" style="display:none;height:100vh;flex-direction:column;">
  <header>
    <div class="brand">Carpool</div>
    <div class="room" id="roomLabel"></div>
    <div class="clock" id="clock"></div>
  </header>
  <main>
    <div class="panel panel-ready" id="readyPanel">
      <div class="panel-label">Dismiss Now</div>
      <div class="ready-names" id="readyNames"></div>
    </div>
    <div class="panel panel-waiting">
      <div class="panel-label">In Line — Heads Up</div>
      <div class="waiting-grid" id="waitingGrid"></div>
    </div>
  </main>
  <footer>
    <span onclick="showSetup()" style="cursor:pointer;text-decoration:underline;">Change room</span>
  </footer>
</div>

<script>
// STEP 6 of the guide: paste your deployed Apps Script URL below.
const APPS_SCRIPT_URL = 'REPLACE_WITH_YOUR_DEPLOYED_WEB_APP_URL';
const ROOM_KEY = 'carpool_room';

function getRoom() {
  const raw = localStorage.getItem(ROOM_KEY);
  return raw ? JSON.parse(raw) : null;
}
function saveRoom(r) { localStorage.setItem(ROOM_KEY, JSON.stringify(r)); }

function showSetup() {
  document.getElementById('setup').style.display = 'flex';
  document.getElementById('display').style.display = 'none';
}
function showDisplay() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('display').style.display = 'flex';
}

document.getElementById('setupSave').onclick = () => {
  const classroom = document.getElementById('setupRoom').value.trim();
  if (!classroom) { alert('Enter a room number.'); return; }
  saveRoom({ classroom });
  init();
};

function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

async function poll(room) {
  try {
    const url = new URL(APPS_SCRIPT_URL);
    url.searchParams.set('action', 'tvdata');
    url.searchParams.set('classroom', room.classroom);
    const res = await fetch(url);
    const data = await res.json();
    if (!data.ok) return;

    const readyPanel = document.getElementById('readyPanel');
    const readyNames = document.getElementById('readyNames');
    if (data.ready.length > 0) {
      readyPanel.style.display = 'block';
      readyNames.innerHTML = data.ready.join('<br>');
    } else {
      readyPanel.style.display = 'none';
    }

    const waitingGrid = document.getElementById('waitingGrid');
    waitingGrid.innerHTML = data.waiting.length
      ? data.waiting.map(f => `<div class="waiting-chip">${f}</div>`).join('')
      : `<div class="waiting-empty">No families waiting.</div>`;
  } catch (err) {
    console.error(err);
  }
}

function init() {
  const room = getRoom();
  if (!room) { showSetup(); return; }
  showDisplay();
  document.getElementById('roomLabel').textContent = `Room ${room.classroom}`;
  updateClock();
  setInterval(updateClock, 1000);
  poll(room);
  setInterval(() => poll(room), 10000);
}

init();
</script>
</body>
</html>
